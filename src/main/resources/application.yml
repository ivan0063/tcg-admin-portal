spring:
  datasource:
    url: ${DB_URL:jdbc:h2:mem:tcgdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  h2:
    console:
      enabled: ${H2_CONSOLE_ENABLED:true}
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:create-drop}
    show-sql: false
    open-in-view: false
  thymeleaf:
    cache: false

server:
  port: ${SERVER_PORT:8080}

scryfall:
  base-url: https://api.scryfall.com

# ── PostgreSQL example (pass as env vars or docker -e flags) ────
# DB_URL=jdbc:postgresql://localhost:5432/tcgdb
# DB_USERNAME=tcguser
# DB_PASSWORD=secret
# DB_DRIVER=org.postgresql.Driver
# JPA_DDL_AUTO=update
# H2_CONSOLE_ENABLED=false
