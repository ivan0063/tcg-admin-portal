<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Deck — TCG Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">New Deck</h1>
        <a th:href="@{/decks}" class="btn-ghost">&#8592; Back</a>
    </div>

    <form th:action="@{/decks}" method="post" class="tcg-form" style="max-width:640px">
        <div class="form-group">
            <label class="form-label" for="name">Deck Name *</label>
            <input id="name" name="name" type="text" class="tcg-input"
                   placeholder="e.g. Mono-Red Burn" required style="width:100%">
        </div>
        <div class="form-group">
            <label class="form-label" for="format">Format *</label>
            <select id="format" name="format" class="tcg-select" style="width:100%">
                <option th:each="f : ${formats}" th:value="${f.name()}" th:text="${f.label}">Format</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Notes</label>
            <textarea id="description" name="description" class="tcg-textarea"
                      placeholder="Deck strategy, notes..."></textarea>
        </div>

        <!-- Optional bulk import -->
        <details class="import-details">
            <summary class="import-summary">
                &#128196; Import from card list <span style="color:var(--text-dim);font-weight:400">(optional)</span>
            </summary>
            <div style="margin-top:.85rem">
                <p class="import-format-hint">
                    One card per line. Supports quantities and sideboard markers:
                </p>
                <pre class="import-example">4 Lightning Bolt
3x Goblin Guide
2 Mountain
Sideboard:
2 Searing Blood
SB: 3 Relic of Progenitus</pre>
                <div class="form-group" style="margin-top:.75rem;margin-bottom:0">
                    <label class="form-label" for="cardList">Card List</label>
                    <textarea id="cardList" name="cardList" class="tcg-textarea import-textarea"
                              placeholder="4 Lightning Bolt&#10;3 Goblin Guide&#10;..."></textarea>
                </div>
            </div>
        </details>

        <div style="display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem">
            <a th:href="@{/decks}" class="btn-ghost">Cancel</a>
            <button type="submit" class="btn-primary-tcg">Create Deck</button>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
