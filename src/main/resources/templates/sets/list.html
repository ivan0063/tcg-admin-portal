<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Browse Sets — TCG Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <style>
        .set-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1rem;
        }
        .set-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: .5rem;
            transition: border-color .2s, background .2s;
        }
        .set-card:hover { border-color: var(--primary); background: var(--bg-elevated); }
        .set-card-header { display: flex; align-items: center; gap: .75rem; }
        .set-icon { width: 28px; height: 28px; object-fit: contain; flex-shrink: 0; filter: invert(1) opacity(.7); }
        .set-name { font-weight: 600; font-size: .95rem; color: var(--text); line-height: 1.3; }
        .set-meta { font-size: .78rem; color: var(--text-muted); display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
        .set-type-badge {
            font-size: .65rem;
            padding: .15rem .45rem;
            border-radius: 4px;
            background: var(--bg-elevated);
            color: var(--text-muted);
            border: 1px solid var(--border);
            text-transform: capitalize;
        }
        .filter-bar {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: .75rem;
            flex-wrap: wrap;
        }
        .filter-bar label { font-size: .85rem; color: var(--text-muted); white-space: nowrap; }
    </style>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">&#9680; Browse Sets</h1>
            <p class="page-subtitle"
               th:text="${#lists.size(sets)} + ' set(s)' + (selectedType != null ? ' · ' + selectedType : '')"></p>
        </div>
        <a th:href="@{/sets}" class="btn-ghost" th:if="${selectedType != null}">
            &#10005; Clear filter
        </a>
    </div>

    <!-- Type filter -->
    <div class="filter-bar">
        <label for="typeFilter">Filter by type:</label>
        <form method="get" action="/sets" style="display:contents">
            <select id="typeFilter" name="type" class="tcg-select" onchange="this.form.submit()">
                <option value="" th:selected="${selectedType == null}">All types</option>
                <option th:each="t : ${setTypes}"
                        th:value="${t}"
                        th:text="${t}"
                        th:selected="${t == selectedType}">type</option>
            </select>
        </form>
    </div>

    <div class="set-grid" th:if="${not #lists.isEmpty(sets)}">
        <a th:each="s : ${sets}"
           th:href="@{/sets/{code}(code=${s.code})}"
           class="set-card">
            <div class="set-card-header">
                <img th:if="${s.iconSvgUri != null}" class="set-icon"
                     th:src="${s.iconSvgUri}" th:alt="${s.name}" loading="lazy">
                <span th:if="${s.iconSvgUri == null}" style="font-size:1.25rem">&#9670;</span>
                <span class="set-name" th:text="${s.name}">Set Name</span>
            </div>
            <div class="set-meta">
                <span th:if="${not #strings.isEmpty(s.releasedAtShort())}"
                      th:text="${s.releasedAtShort()}">Jan 2024</span>
                <span th:text="${s.cardCount} + ' cards'">250 cards</span>
                <span class="set-type-badge" th:text="${s.setType}">expansion</span>
            </div>
        </a>
    </div>

    <div class="empty-state" th:if="${#lists.isEmpty(sets)}">
        <div class="empty-icon">&#128218;</div>
        <p style="font-size:1.1rem;color:var(--text-muted)">No sets found</p>
        <p class="empty-hint">Try a different type filter or check the Scryfall connection.</p>
    </div>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
