<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Collection — TCG Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="page-container">
    <div class="page-header">
        <h1 class="page-title">New Collection</h1>
        <a th:href="@{/collections}" class="btn-ghost">&#8592; Back</a>
    </div>

    <form th:action="@{/collections}" method="post" class="tcg-form">
        <div class="form-group">
            <label class="form-label" for="name">Collection Name *</label>
            <input id="name" name="name" type="text" class="tcg-input"
                   placeholder="e.g. Standard Staples" required style="width:100%">
        </div>
        <div class="form-group">
            <label class="form-label" for="description">Description</label>
            <textarea id="description" name="description" class="tcg-textarea"
                      placeholder="Optional notes about this collection..."></textarea>
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end">
            <a th:href="@{/collections}" class="btn-ghost">Cancel</a>
            <button type="submit" class="btn-primary-tcg">Create Collection</button>
        </div>
    </form>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
